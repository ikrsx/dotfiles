background {
    path = screenshot
    color = rgba(20, 20, 20, 1.0)
    blur_passes = 4
}

label {
    text = cmd[update:1000] echo "<span color='##cdd6f4'>$(date '+%H:%M')</span>"
    text_align = center
    font_size = 66
    font_family = JetBrainsMono Nerd Font ExtraBold

    position = 0, 80
    halign = center
    valign = center
}

label {
    text = cmd[update:9000] echo "<span color='##cdd6f4'>$(date '+%A %d %B')</span>"
    text_align = center
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, 25
    halign = center
    valign = center
}

input-field {
    size = 15%, 5%
    outline_thickness = 0
    inner_color = rgba(88, 91, 112, 0.25)

    outer_color = rgba(203, 166, 247, 0.25)
    check_color=rgba(148, 226, 213, 0.25)
    fail_color=rgba(243, 139, 168, 0.25)

    font_family = JetBrainsMono Nerd Font
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = true
    rounding = 15

    position = 0, -40
    halign = center
    valign = center
}
